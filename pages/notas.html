<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notas - IPPE CONNECT</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Lançamento de Notas</h2>

<button class="btn btn-success mb-3" onclick="abrirModal()">Lançar Nota</button>

<table class="table table-bordered">

<thead>
<tr>

<th>Aluno</th>
<th>Disciplina</th>

<th>Mac</th>
<th>NPP</th>
<th>NPT</th>

<th>CT1</th>
<th>CT2</th>
<th>CT3</th>

<th>CF</th>
<th>CA</th>

<th>Ações</th>

</tr>
</thead>

<tbody id="tabelaNotas"></tbody>

</table>

</div>


<div class="modal" id="modalNotas">

<div class="modal-dialog">

<div class="modal-content p-3">

<h5>Lançar Nota</h5>

<select id="alunoNota" class="form-control mb-2"></select>

<select id="disciplinaNota" class="form-control mb-2"></select>

<input type="number" id="mac" placeholder="Mac" class="form-control mb-2">
<input type="number" id="npp" placeholder="NPP" class="form-control mb-2">
<input type="number" id="npt" placeholder="NPT" class="form-control mb-2">

<input type="number" id="pg" placeholder="Prova Global (opcional)" class="form-control mb-2">

<button class="btn btn-primary" onclick="salvarNota()">Salvar</button>
<button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/notas.js"></script>

</body>
</html>
