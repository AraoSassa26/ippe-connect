<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagamentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Pagamentos</h2>

<button class="btn btn-success mb-3" onclick="abrirModal()">Registrar Pagamento</button>

<table class="table table-striped">

<thead>

<tr>

<th>Aluno</th>
<th>Valor</th>
<th>Status</th>
<th>Data</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tabelaPagamentos"></tbody>

</table>

</div>

<div class="modal" id="modalPagamento">

<div class="modal-dialog">

<div class="modal-content p-3">

<h5>Novo Pagamento</h5>

<select id="alunoPagamento" class="form-control mb-2"></select>

<input type="number" id="valorPagamento" placeholder="Valor" class="form-control mb-2">

<select id="statusPagamento" class="form-control mb-2">

<option value="pendente">Pendente</option>
<option value="pago">Pago</option>

</select>

<input type="date" id="dataPagamento" class="form-control mb-2">

<button class="btn btn-primary" onclick="salvarPagamento()">Salvar</button>
<button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="../js/supabaseClient.js"></script>

<script src="../js/pagamentos.js"></script>

</body>
</html>
