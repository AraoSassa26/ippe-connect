<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turmas - IPPE CONNECT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2>Turmas</h2>

  <button class="btn btn-success mb-3" onclick="abrirModal()">Adicionar Turma</button>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Ano</th>
        <th>Curso</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabelaTurmas"></tbody>
  </table>
</div>

<!-- Modal de cadastro de turma -->
<div class="modal" tabindex="-1" id="modalTurma">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Adicionar Turma</h5>
      <input type="text" id="nomeTurma" placeholder="Nome da Turma" class="form-control mb-2">
      <input type="number" id="anoTurma" placeholder="Ano" class="form-control mb-2">
      <select id="cursoTurma" class="form-control mb-2"></select>
      <button class="btn btn-primary" onclick="adicionarTurma()">Salvar</button>
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/turmas.js"></script>

</body>
</html>
