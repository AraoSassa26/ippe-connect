<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alunos - IPPE CONNECT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
<div class="container mt-5">
<h2>Alunos</h2>

<button class="btn btn-success mb-3" onclick="abrirModal()">Adicionar Aluno</button>

<table class="table table-striped">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Curso</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaAlunos"></tbody>
</table>
</div>


<div class="modal" tabindex="-1" id="modalAluno">
<div class="modal-dialog">
<div class="modal-content p-3">
<h5>Adicionar Aluno</h5>
<input type="text" id="nomeAluno" placeholder="Nome" class="form-control mb-2">
<input type="email" id="emailAluno" placeholder="Email" class="form-control mb-2">
<select id="cursoAluno" class="form-control mb-2"></select>
<button class="btn btn-primary" onclick="adicionarAluno()">Salvar</button>
<button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/alunos.js"></script>
</body>
</html>
