<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos - IPPE CONNECT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<h2>Cursos</h2>
<button class="btn btn-success mb-3" onclick="abrirModal()">Adicionar Curso</button>
<table class="table table-striped">
<thead>
<tr><th>Nome</th><th>Descrição</th><th>Ações</th></tr>
</thead>
<tbody id="tabelaCursos"></tbody>
</table>
</div>

<div class="modal" id="modalCurso">
<div class="modal-dialog">
<div class="modal-content p-3">
<h5>Adicionar Curso</h5>
<input type="text" id="nomeCurso" placeholder="Nome" class="form-control mb-2">
<input type="text" id="descricaoCurso" placeholder="Descrição" class="form-control mb-2">
<button class="btn btn-primary" onclick="adicionarCurso()">Salvar</button>
<button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/cursos.js"></script>
</body>
</html>
