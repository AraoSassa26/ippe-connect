<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professores - IPPE CONNECT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<h2>Professores</h2>

<button class="btn btn-success mb-3" onclick="abrirModal()">Adicionar Professor</button>

<table class="table table-striped">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Especialidade</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaProfessores"></tbody>
</table>
</div>

<!-- Modal de cadastro -->
<div class="modal" tabindex="-1" id="modalProfessor">
<div class="modal-dialog">
<div class="modal-content p-3">
<h5>Adicionar Professor</h5>
<input type="text" id="nomeProfessor" placeholder="Nome" class="form-control mb-2">
<input type="email" id="emailProfessor" placeholder="Email" class="form-control mb-2">
<input type="text" id="especialidadeProfessor" placeholder="Especialidade" class="form-control mb-2">
<button class="btn btn-primary" onclick="adicionarProfessor()">Salvar</button>
<button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/professores.js"></script>
</body>
</html>
