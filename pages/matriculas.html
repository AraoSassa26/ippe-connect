<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrículas - IPPE CONNECT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
<h2>Matrículas</h2>

<button class="btn btn-success mb-3" onclick="abrirModal()">Nova Matrícula</button>

<table class="table table-striped">
<thead>
<tr><th>Aluno</th><th>Turma</th><th>Data</th><th>Status</th><th>Ações</th></tr>
</thead>
<tbody id="tabelaMatriculas"></tbody>
</table>
</div>

<div class="modal" id="modalMatricula">
<div class="modal-dialog">
<div class="modal-content p-3">
<h5>Adicionar Matrícula</h5>
<select id="alunoMatricula" class="form-control mb-2"></select>
<select id="turmaMatricula" class="form-control mb-2"></select>
<input type="date" id="dataMatricula" class="form-control mb-2">
<select id="statusMatricula" class="form-control mb-2">
  <option value="ativa">Ativa</option>
  <option value="inativa">Inativa</option>
</select>
<button class="btn btn-primary" onclick="adicionarMatricula()">Salvar</button>
<button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/matriculas.js"></script>

</body>
</html>
